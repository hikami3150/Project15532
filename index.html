<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOS-DAN TERMINAL v1.0</title>
  <meta name="description" content="SOS団部室端末 — コマンドライン風チャットシステム" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0c;
      --bg2: #111111;
      --bg3: #1a1a1a;
      --text: #c8c8c8;
      --text-bright: #f0f0f0;
      --dim: #555555;
      --border: #303030;
      --highlight: #1c1c1c;
      --font: 'Share Tech Mono', 'Courier New', Courier, monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; }

    /* ========== SCREENS ========== */
    .screen { display: none; width: 100%; height: 100vh; }
    .screen.active { display: flex; }

    /* ========== LOGIN ========== */
    #screen-login {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-wrap {
      width: 100%;
      max-width: 600px;
    }

    .ascii-banner {
      margin-bottom: 24px;
      font-size: 12px;
      line-height: 1.35;
      user-select: none;
    }

    .section-label {
      color: var(--text-bright);
      margin-bottom: 4px;
    }

    .section-sub {
      color: var(--dim);
      font-size: 12px;
      margin-bottom: 20px;
    }

    .sep { color: var(--border); margin: 18px 0; user-select: none; }

    .field-row {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      gap: 8px;
    }
    .field-row label {
      color: var(--dim);
      font-size: 13px;
      min-width: 150px;
      flex-shrink: 0;
    }
    .field-row input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text-bright);
      font-family: var(--font);
      font-size: 13px;
      padding: 3px 6px;
      outline: none;
      caret-color: #c8c8c8;
      transition: border-color 0.2s;
    }
    .field-row input:focus { border-bottom-color: #666; }
    .field-row input::placeholder { color: #333; }

    .btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 5px 18px;
      cursor: pointer;
      margin-right: 8px;
      margin-top: 4px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .btn:hover {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    .btn.primary {
      border-color: var(--text-bright);
      color: var(--text-bright);
    }
    .btn.primary:hover {
      background: var(--text-bright);
      color: var(--bg);
    }

    .status-line {
      min-height: 18px;
      font-size: 12px;
      margin-top: 12px;
    }
    .status-line.err { color: #c06060; }
    .status-line.ok { color: #60aa70; }

    /* ========== MAIN ========== */
    #screen-main { flex-direction: column; }

    .titlebar {
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      padding: 5px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      user-select: none;
      font-size: 12px;
    }
    .titlebar-left { color: var(--dim); }
    .titlebar-left strong { color: var(--text); }
    .titlebar-right { display: flex; align-items: center; gap: 14px; }
    .user-badge { color: var(--dim); font-size: 12px; }
    .user-badge em { font-style: normal; color: var(--text-bright); }

    .btn-sm {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--dim);
      font-family: var(--font);
      font-size: 11px;
      padding: 2px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-sm:hover { border-color: var(--text); color: var(--text); }

    /* body layout */
    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ========== SIDEBAR ========== */
    .sidebar {
      width: 210px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      flex-direction: column;
    }

    .sb-block {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sb-title {
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .add-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .add-prompt { color: var(--dim); font-size: 12px; flex-shrink: 0; }
    .add-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text-bright);
      font-family: var(--font);
      font-size: 12px;
      padding: 2px 4px;
      outline: none;
      caret-color: #c8c8c8;
    }
    .add-input:focus { border-bottom-color: #666; }
    .add-input::placeholder { color: #333; }
    .add-btn {
      background: transparent;
      border: none;
      color: var(--dim);
      font-family: var(--font);
      font-size: 13px;
      cursor: pointer;
      padding: 0 3px;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .add-btn:hover { color: var(--text-bright); }

    .sb-status { font-size: 11px; min-height: 15px; margin-top: 5px; color: var(--dim); }
    .sb-status.err { color: #c06060; }
    .sb-status.ok { color: #60aa70; }

    .friend-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .f-item {
      padding: 6px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text);
      border-left: 2px solid transparent;
      transition: background 0.1s;
    }
    .f-item:hover { background: var(--highlight); }
    .f-item.active {
      background: var(--highlight);
      border-left-color: var(--text-bright);
      color: var(--text-bright);
    }
    .f-badge {
      margin-left: auto;
      font-size: 10px;
      background: var(--text);
      color: var(--bg);
      padding: 0 4px;
    }

    .empty-list {
      padding: 10px 12px;
      color: var(--dim);
      font-size: 12px;
      font-style: italic;
    }

    /* ========== CHAT ========== */
    .chat-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-topbar {
      border-bottom: 1px solid var(--border);
      padding: 6px 16px;
      font-size: 12px;
      color: var(--dim);
      flex-shrink: 0;
      user-select: none;
    }

    .chat-msgs {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .msg-row {
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.7;
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    .msg-row .m-user { color: var(--text-bright); }
    .msg-row .m-arrow { color: var(--dim); }
    .msg-row .m-body { color: var(--text); }
    .msg-row .m-ts { color: #2e2e2e; font-size: 11px; margin-left: 8px; }
    .msg-row.is-me .m-user { color: #88bbdd; }
    .msg-row.is-me .m-body { color: #c8dff0; }

    .sys-row {
      font-size: 11px;
      color: var(--dim);
      font-style: italic;
      margin: 3px 0;
    }

    .no-chat-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--dim);
      font-size: 13px;
      gap: 5px;
      user-select: none;
    }
    .no-chat-msg .big { font-size: 20px; color: #222; letter-spacing: 4px; }

    .chat-input-bar {
      border-top: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .ci-prompt { color: var(--text-bright); font-size: 13px; flex-shrink: 0; white-space: nowrap; }
    .ci-arrow { color: var(--dim); font-size: 13px; flex-shrink: 0; }
    .ci-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-bright);
      font-family: var(--font);
      font-size: 13px;
      outline: none;
      caret-color: #c8c8c8;
    }
    .ci-input::placeholder { color: #2a2a2a; }
    .ci-input:disabled { opacity: 0.25; cursor: not-allowed; }

    /* scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
      z-index: 9999;
    }

    /* toast */
    #toast {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 7px 14px;
      z-index: 10000;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 580px) {
      .sidebar { width: 150px; }
      .ascii-banner { display: none; }
    }
  </style>
</head>
<body>

<div id="toast"></div>

<!-- ===========================
     LOGIN SCREEN
     =========================== -->
<div id="screen-login" class="screen active">
  <div class="login-wrap">

    <div style="margin-bottom:28px;">
      <div style="color:#e0e0e0;font-size:16px;letter-spacing:2px;margin-bottom:8px;">Project 15532</div>
      <div style="color:#404040;font-size:12px;"><span id="sys-clock"></span></div>
    </div>

    <div class="field-row">
      <label>USER_ID :</label>
      <input id="l-uid" type="text" autocomplete="off" spellcheck="false" placeholder="enter user id" maxlength="32" />
    </div>
    <div class="field-row">
      <label>PASSWORD :</label>
      <input id="l-pw" type="password" autocomplete="off" placeholder="enter password" maxlength="64" />
    </div>

    <div style="margin-top:16px;">
      <button class="btn primary" id="btn-login">[ LOGIN ]</button>
      <button class="btn" id="btn-show-reg">[ NEW USER ]</button>
    </div>
    <div class="status-line" id="l-msg"></div>

    <div class="sep">──────────────────────────────────────────────────</div>

    <!-- REGISTER -->
    <div id="reg-panel" style="display:none;">

      <div class="field-row" style="margin-top:12px;">
        <label>NEW USER_ID :</label>
        <input id="r-uid" type="text" autocomplete="off" spellcheck="false" placeholder="alphanumeric, max 32" maxlength="32" />
      </div>
      <div class="field-row">
        <label>NEW PASSWORD :</label>
        <input id="r-pw" type="password" autocomplete="off" placeholder="min 4 characters" maxlength="64" />
      </div>
      <div class="field-row">
        <label>CONFIRM PW :</label>
        <input id="r-pw2" type="password" autocomplete="off" placeholder="repeat password" maxlength="64" />
      </div>

      <div style="margin-top:14px;">
        <button class="btn primary" id="btn-reg">[ REGISTER ]</button>
        <button class="btn" id="btn-cancel-reg">[ CANCEL ]</button>
      </div>
      <div class="status-line" id="r-msg"></div>
    </div>

  </div>
</div>

<!-- ===========================
     MAIN SCREEN
     =========================== -->
<div id="screen-main" class="screen">

  <!-- Title bar -->
  <div class="titlebar">
    <div class="titlebar-right" style="margin-left:auto;">
      <button class="btn-sm" id="btn-logout">[ LOGOUT ]</button>
    </div>
  </div>

  <div class="layout">
    <!-- Sidebar -->
    <div class="sidebar">
      <!-- Add friend -->
      <div class="sb-block">
        <div class="sb-title">Add Friend</div>
        <div class="add-row">
          <span class="add-prompt">C:\&gt;</span>
          <input class="add-input" id="add-uid" type="text" spellcheck="false" autocomplete="off" placeholder="user_id..." maxlength="32" />
          <button class="add-btn" id="btn-add-f" title="追加">[+]</button>
        </div>
        <div class="sb-status" id="add-msg"></div>
      </div>

      <!-- Friend list -->
      <div class="sb-block" style="border-bottom:none;flex:1;overflow:hidden;display:flex;flex-direction:column;">
        <div class="sb-title">Friends (<span id="f-count">0</span>)</div>
        <div class="friend-list" id="f-list">
          <div class="empty-list">No connections.</div>
        </div>
      </div>
    </div>

    <!-- Chat pane -->
    <div class="chat-pane">
      <div class="chat-topbar" id="chat-topbar">
        &gt; Select a connection from the sidebar to start
      </div>
      <div class="chat-msgs" id="chat-msgs">
        <div class="no-chat-msg">
          <div class="big">█ &nbsp; █ &nbsp; █</div>
          <div>No channel open.</div>
          <div style="font-size:11px;margin-top:4px;color:#2e2e2e;">Add a friend and select them to begin.</div>
        </div>
      </div>
      <div class="chat-input-bar">
        <span class="ci-prompt" id="ci-name">SYSTEM</span>
        <span class="ci-arrow">&gt;</span>
        <input class="ci-input" id="ci-input" type="text" autocomplete="off" spellcheck="false" placeholder="" disabled maxlength="500" />
      </div>
    </div>

  </div>
</div>

<script>
/* ============================================================
   DATA LAYER  (localStorage)
   ============================================================ */
const DB = {
  getUsers() {
    return JSON.parse(localStorage.getItem('sos_users') || '{}');
  },
  setUsers(u) {
    localStorage.setItem('sos_users', JSON.stringify(u));
  },
  roomId(a, b) {
    return [a, b].sort().join('::');
  },
  getMsgs(room) {
    return JSON.parse(localStorage.getItem('sos_m_' + room) || '[]');
  },
  addMsg(room, msg) {
    const arr = this.getMsgs(room);
    arr.push(msg);
    localStorage.setItem('sos_m_' + room, JSON.stringify(arr));
  },
  getReadPtr(user, friend) {
    return parseInt(localStorage.getItem('sos_r_' + user + '_' + friend) || '0', 10);
  },
  setReadPtr(user, friend, n) {
    localStorage.setItem('sos_r_' + user + '_' + friend, String(n));
  }
};

/* ============================================================
   STATE
   ============================================================ */
let me = null;        // current user id
let activeFriend = null;
let msgCount = 0;
let pollTimer = null;
let unread = {};      // friendId -> number

/* ============================================================
   UTILS
   ============================================================ */
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function hhmm(ts) {
  const d = new Date(ts);
  return [d.getHours(), d.getMinutes(), d.getSeconds()]
    .map(n => String(n).padStart(2,'0')).join(':');
}
function hashPw(pw) {
  let h = 5381;
  for (let i = 0; i < pw.length; i++) h = ((h << 5) + h) ^ pw.charCodeAt(i);
  return 'k' + (h >>> 0).toString(36) + '_' + pw.length;
}
function setStatus(id, txt, type) {
  const el = document.getElementById(id);
  el.textContent = txt;
  el.className = 'status-line' + (type ? ' ' + type : '');
}
function setSbStatus(txt, type) {
  const el = document.getElementById('add-msg');
  el.textContent = txt;
  el.className = 'sb-status' + (type ? ' ' + type : '');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ============================================================
   CLOCK
   ============================================================ */
function tickClock() {
  const el = document.getElementById('sys-clock');
  if (el) el.textContent = new Date().toLocaleString('ja-JP');
}
setInterval(tickClock, 1000);
tickClock();

/* ============================================================
   AUTO LOGIN
   ============================================================ */
(function() {
  const saved = localStorage.getItem('sos_session');
  if (saved && DB.getUsers()[saved]) {
    goMain(saved);
  }
})();

/* ============================================================
   LOGIN / REGISTER
   ============================================================ */
document.getElementById('btn-show-reg').onclick = () => {
  document.getElementById('reg-panel').style.display = 'block';
  document.getElementById('r-uid').focus();
};
document.getElementById('btn-cancel-reg').onclick = () => {
  document.getElementById('reg-panel').style.display = 'none';
  clearReg();
};

document.getElementById('btn-login').onclick = doLogin;
document.getElementById('l-pw').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
document.getElementById('l-uid').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('l-pw').focus(); });

document.getElementById('btn-reg').onclick = doRegister;
document.getElementById('r-pw2').addEventListener('keydown', e => { if (e.key==='Enter') doRegister(); });

function doLogin() {
  const uid = document.getElementById('l-uid').value.trim();
  const pw  = document.getElementById('l-pw').value;
  if (!uid || !pw) { setStatus('l-msg','ERROR: Fields are empty.','err'); return; }
  const users = DB.getUsers();
  if (!users[uid]) { setStatus('l-msg','ERROR: User "'+uid+'" not found.','err'); return; }
  if (users[uid].pw !== hashPw(pw)) { setStatus('l-msg','ERROR: Incorrect password.','err'); return; }
  setStatus('l-msg','OK: Authentication successful. Loading...','ok');
  setTimeout(() => { localStorage.setItem('sos_session', uid); goMain(uid); }, 500);
}

function doRegister() {
  const uid  = document.getElementById('r-uid').value.trim();
  const pw   = document.getElementById('r-pw').value;
  const pw2  = document.getElementById('r-pw2').value;
  if (!uid || !pw || !pw2) { setStatus('r-msg','ERROR: All fields required.','err'); return; }
  if (!/^[a-zA-Z0-9_.\-]{1,32}$/.test(uid)) {
    setStatus('r-msg','ERROR: ID must be alphanumeric / _ . - only.','err'); return;
  }
  if (pw.length < 4) { setStatus('r-msg','ERROR: Password min 4 characters.','err'); return; }
  if (pw !== pw2)    { setStatus('r-msg','ERROR: Passwords do not match.','err'); return; }
  const users = DB.getUsers();
  if (users[uid]) { setStatus('r-msg','ERROR: User "'+uid+'" already exists.','err'); return; }
  users[uid] = { pw: hashPw(pw), friends: [], created: Date.now() };
  DB.setUsers(users);
  setStatus('r-msg','OK: User "'+uid+'" registered. Please login.','ok');
  document.getElementById('l-uid').value = uid;
  clearReg();
  setTimeout(() => { document.getElementById('reg-panel').style.display = 'none'; }, 1600);
}

function clearReg() {
  ['r-uid','r-pw','r-pw2'].forEach(id => document.getElementById(id).value = '');
  setStatus('r-msg','','');
}

/* ============================================================
   MAIN
   ============================================================ */
function goMain(uid) {
  me = uid;
  activeFriend = null;
  unread = {};
  msgCount = 0;
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-main').classList.add('active');
  document.getElementById('lbl-user').textContent = uid;
  document.getElementById('ci-name').textContent  = uid;
  renderFriends();
  showNoChat();
  startPoll();
}

document.getElementById('btn-logout').onclick = () => {
  me = null;
  activeFriend = null;
  stopPoll();
  localStorage.removeItem('sos_session');
  document.getElementById('screen-main').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('l-pw').value = '';
  setStatus('l-msg','','');
};

/* ============================================================
   FRIENDS
   ============================================================ */
document.getElementById('btn-add-f').onclick = addFriend;
document.getElementById('add-uid').addEventListener('keydown', e => { if (e.key==='Enter') addFriend(); });

function addFriend() {
  const fid = document.getElementById('add-uid').value.trim();
  if (!fid) { setSbStatus('ERROR: Enter a user ID.','err'); return; }
  if (fid === me) { setSbStatus('ERROR: Cannot add yourself.','err'); return; }
  const users = DB.getUsers();
  if (!users[fid]) { setSbStatus('ERROR: User "'+fid+'" not found.','err'); return; }
  if (users[me].friends.includes(fid)) { setSbStatus('WARN: Already connected.','err'); return; }
  users[me].friends.push(fid);
  if (!users[fid].friends.includes(me)) users[fid].friends.push(me);
  DB.setUsers(users);
  document.getElementById('add-uid').value = '';
  setSbStatus('OK: Added "'+fid+'".','ok');
  setTimeout(() => setSbStatus(''), 2500);
  renderFriends();
}

function renderFriends() {
  if (!me) return;
  const users = DB.getUsers();
  const friends = (users[me] && users[me].friends) || [];
  document.getElementById('f-count').textContent = friends.length;
  const list = document.getElementById('f-list');

  if (!friends.length) {
    list.innerHTML = '<div class="empty-list">No connections.<br>Add a friend above.</div>';
    return;
  }

  list.innerHTML = '';
  friends.forEach(fid => {
    const div = document.createElement('div');
    div.className = 'f-item' + (activeFriend === fid ? ' active' : '');

    const name = document.createElement('span');
    name.textContent = fid;
    div.appendChild(name);

    const u = unread[fid] || 0;
    if (u > 0) {
      const b = document.createElement('span');
      b.className = 'f-badge';
      b.textContent = u;
      div.appendChild(b);
    }

    div.addEventListener('click', () => openChat(fid));
    list.appendChild(div);
  });
}

/* ============================================================
   CHAT
   ============================================================ */
function openChat(fid) {
  activeFriend = fid;
  unread[fid] = 0;
  msgCount = 0;
  renderFriends();

  // サイドバーを隠して全画面チャット
  document.querySelector('.sidebar').style.display = 'none';

  document.getElementById('chat-topbar').innerHTML =
    '<button id="btn-back" style="background:transparent;border:none;color:var(--dim);font-family:var(--font);font-size:12px;cursor:pointer;margin-right:12px;padding:0;" onclick="goBack()">[ ← back ]</button>' +
    '<span style="color:var(--text-bright)">' + esc(fid) + '</span>';

  const room = DB.roomId(me, fid);
  const msgs = DB.getMsgs(room);
  msgCount = msgs.length;
  DB.setReadPtr(me, fid, msgCount);

  const container = document.getElementById('chat-msgs');
  container.innerHTML = '';

  if (!msgs.length) {
    appendSys('--- Session started. No messages yet. ---');
  } else {
    appendSys('--- ' + msgs.length + ' message(s) loaded ---');
    msgs.forEach(m => appendMsgEl(m, false));
  }

  scrollBot();
  const ci = document.getElementById('ci-input');
  ci.disabled = false;
  ci.placeholder = 'type and press Enter...';
  ci.focus();
}

function goBack() {
  activeFriend = null;
  document.querySelector('.sidebar').style.display = 'flex';
  showNoChat();
}

function showNoChat() {
  document.getElementById('chat-topbar').textContent = '> Select a connection from the sidebar to start';
  document.getElementById('chat-msgs').innerHTML = `
    <div class="no-chat-msg">
      <div class="big">█ &nbsp; █ &nbsp; █</div>
      <div>No channel open.</div>
      <div style="font-size:11px;margin-top:4px;color:#2e2e2e;">Add a friend and select them to begin.</div>
    </div>`;
  const ci = document.getElementById('ci-input');
  ci.disabled = true;
  ci.placeholder = '';
}

function appendSys(txt) {
  const d = document.createElement('div');
  d.className = 'sys-row';
  d.textContent = txt;
  document.getElementById('chat-msgs').appendChild(d);
}

function appendMsgEl(msg, anim) {
  const row = document.createElement('div');
  row.className = 'msg-row' + (msg.from === me ? ' is-me' : '');
  if (!anim) row.style.animation = 'none';

  const u = document.createElement('span');
  u.className = 'm-user';
  u.textContent = msg.from;

  const ar = document.createElement('span');
  ar.className = 'm-arrow';
  ar.textContent = '>';

  const body = document.createElement('span');
  body.className = 'm-body';
  body.textContent = msg.text;

  const ts = document.createElement('span');
  ts.className = 'm-ts';
  ts.textContent = '[' + hhmm(msg.ts) + ']';

  row.appendChild(u);
  row.appendChild(ar);
  row.appendChild(document.createTextNode(' '));
  row.appendChild(body);
  row.appendChild(ts);
  document.getElementById('chat-msgs').appendChild(row);
}

function scrollBot() {
  const c = document.getElementById('chat-msgs');
  c.scrollTop = c.scrollHeight;
}

document.getElementById('ci-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMsg();
});

function sendMsg() {
  const ci = document.getElementById('ci-input');
  const txt = ci.value.trim();
  if (!txt || !activeFriend) return;
  ci.value = '';

  const msg = { from: me, text: txt, ts: Date.now() };
  const room = DB.roomId(me, activeFriend);
  DB.addMsg(room, msg);
  appendMsgEl(msg, true);
  scrollBot();
  msgCount++;
  DB.setReadPtr(me, activeFriend, msgCount);
}

/* ============================================================
   POLLING — simulated real-time via localStorage
   ============================================================ */
function startPoll() {
  stopPoll();
  pollTimer = setInterval(poll, 900);
}
function stopPoll() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = null;
}

function poll() {
  if (!me) return;

  // New messages in active chat (from the other party)
  if (activeFriend) {
    const room = DB.roomId(me, activeFriend);
    const msgs = DB.getMsgs(room);
    if (msgs.length > msgCount) {
      const incoming = msgs.slice(msgCount);
      incoming.forEach(m => {
        if (m.from !== me) {
          appendMsgEl(m, true);
          scrollBot();
        }
      });
      msgCount = msgs.length;
      DB.setReadPtr(me, activeFriend, msgCount);
    }
  }

  // Unread badges for other friends
  const users = DB.getUsers();
  const friends = (users[me] && users[me].friends) || [];
  let dirty = false;
  friends.forEach(fid => {
    if (fid === activeFriend) return;
    const room = DB.roomId(me, fid);
    const total = DB.getMsgs(room).length;
    const read  = DB.getReadPtr(me, fid);
    const n = Math.max(0, total - read);
    if (n !== (unread[fid] || 0)) { unread[fid] = n; dirty = true; }
  });
  if (dirty) renderFriends();
}

/* ============================================================
   KEYBOARD SHORTCUTS
   ============================================================ */
document.addEventListener('keydown', e => {
  // Esc: refocus chat input
  if (e.key === 'Escape' && me) document.getElementById('ci-input').focus();
});
</script>
</body>
</html>
